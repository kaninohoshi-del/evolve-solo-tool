<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shadowverse EVOLVE 2面対戦ビュー v1.20</title>
<style>
:root{--bg:#070a12;--panel:#11182b;--line:rgba(145,190,255,.25);--txt:#f2f7ff;--muted:#9fb0cf;--acc:#67d9ff}
*{box-sizing:border-box}
html,body{height:100%;min-width:0}
body{margin:0;background:radial-gradient(circle at 20% -5%,rgba(77,147,255,.28),transparent 34%),linear-gradient(180deg,#071020 0%,#05060c 100%);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
.duel-shell{height:100vh;display:grid;grid-template-rows:1fr;gap:0;padding:6px}
.duel-head{display:none}
.duel-grid{min-height:0;height:100%;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:8px}
.player-frame{min-width:0;min-height:0;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#050811;box-shadow:0 18px 46px rgba(0,0,0,.34)}
.player-label{position:absolute;z-index:5;margin:8px 0 0 10px;padding:4px 9px;border-radius:999px;background:rgba(5,9,18,.82);border:1px solid rgba(145,190,255,.32);font-size:12px;font-weight:900;color:#dcecff;pointer-events:none}
.frame-wrap{position:relative;min-width:0;min-height:0;display:grid}
iframe{width:100%;height:100%;border:0;background:#050811}
@media(max-width:900px){body{overflow:auto}.duel-shell{height:auto;min-height:100vh}.duel-grid{height:auto;grid-template-columns:1fr;grid-auto-rows:minmax(680px,96vh)}}

</style>
</head>
<body>
  <!-- ※このツールは非公式のファン制作ツールです。 -->
  <main class="duel-shell">
<section class="duel-grid">
      <div class="frame-wrap player-frame">
        <div class="player-label">PLAYER 1</div>
        <iframe src="sve_duel_solo_v1.2.html" title="PLAYER 1"></iframe>
      </div>
      <div class="frame-wrap player-frame">
        <div class="player-label">PLAYER 2</div>
        <iframe src="sve_duel_solo_v1.2.html" title="PLAYER 2"></iframe>
      </div>
    </section>
  </main>
</body>
</html>
